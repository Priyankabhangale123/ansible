--- 
- name: nginx install
  host: localhost
  tasks:
  - name: install nginx
    ansible.builtin.dnf:
      name: nginx
      state: present
  - name: start and enable nginx
    ansible.builtin.systemd_service:
      name: nginx
      state: started
      enable: true
  - name: deployed index.html
    ansible.builtin.copy:
      dest: /usr/share/nginx/html/index.html
      content:
        <h1> welcome to nginx </h1>
